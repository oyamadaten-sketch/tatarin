                      currentGrid[y][x] = { type: getRandomType(), id: `new-${Date.now()}-${x}-${y}-${Math.random()}`, isObstacle: false, isFalling: true };
                  }
              }
              gridRef.current = currentGrid; setGrid([...JSON.parse(JSON.stringify(currentGrid))]);
              await wait(600);
              const matches = findMatches(currentGrid);
              if (matches.length > 0) await processMatches(matches); else setIsProcessing(false);
          }

          const getChihiroIconKey = () => {
              const spk = assistantMsg.speaker;
              if (spk === 'boss') return curseGauge > 80 ? "ICON_BOSS_ANGRY" : "ICON_BOSS_NORMAL";
              if (spk === 'enemy') return "ICON_NOISE";
              if (spk === 'system') return "ICON_NOISE";

              if (day >= 7) return "ICON_CHIHIRO_DEAD";
              if (mode === "CURSE_BACK") return "ICON_CHIHIRO_SAD";
              if (curseGauge > 80) return "ICON_CHIHIRO_JOY";
              if (curseGauge > 50) return "ICON_CHIHIRO_SMILE";
              return "ICON_CHIHIRO_NORMAL";
          };

          const getSpeakerName = () => {
              const spk = assistantMsg.speaker;
              if (spk === 'boss') return '代表';
              if (spk === 'enemy') return '敵呪術師';
              if (spk === 'system') return 'システム';
              if (day === 7) return 'チヒロ？';
              return 'チヒロ';
          };

          useEffect(() => {
            mountedRef.current = true;
            initGrid();
            return () => { mountedRef.current = false; };
          }, []);

          // --- Timer & Game Loop Optimization ---
          useEffect(() => {
              if (intervalRef.current) clearInterval(intervalRef.current);
              
              intervalRef.current = setInterval(() => {
                  if (!mountedRef.current || showClearEffect) return;
                  
                  // Use functional updates to access latest state without re-creating interval
                  setTime(t => {
                      if (t <= 0) { finishGame(false); return 0; }
                      return t - 1;
                  });
                  
                  setSpirit(s => {
                      if (s <= 0) { finishGame(false); return 0; }
                      
                      // 【難易度調整】お邪魔ピースによる精神への継続ダメージ
                      let obstacleCount = 0;
                      for (let y = 0; y < BOARD_SIZE; y++) {
                          for (let x = 0; x < BOARD_SIZE; x++) {
                              if (gridRef.current[y][x] && gridRef.current[y][x].isObstacle) {
                                  obstacleCount++;
                              }
                          }
                      }
                      
                      let damage = 0;
                      if (obstacleCount > 0) {
                          // 日数経過でダメージ量が増加（1日目:0.1/個、以降0.1ずつ増加、最大0.8/個）
                          const damagePerObstacle = Math.min(0.8, 0.1 + (day - 1) * 0.1); 
                          damage = obstacleCount * damagePerObstacle;
                      }
                      
                      const nextSpirit = Math.max(0, s - damage);
                      if (nextSpirit <= 0) { finishGame(false); return 0; }
                      return nextSpirit;
                  });

              }, 1000);

              return () => clearInterval(intervalRef.current);
          }, []); // Empty dependency! This runs once.

          // Second effect for game logic that depends on time/mode changes
          useEffect(() => {
              if (time <= 0 || spirit <= 0 || showClearEffect) return;

              // Game Events Logic
              if (mode === 'NORMAL') {
                  const shouldTrigger = day === 8 
                      ? (Math.random() < 0.1 && curseBackCount < story.curseBackCount)
                      : (time === 90 || time === 60 || time === 30) && curseBackCount < story.curseBackCount;
                  
                  if (shouldTrigger) startCurseBack();
                  if (day >= 2 && Math.random() < 0.05) executeEnemyAttack('RANDOM');
                  
                  if (day >= 7 && time % 5 === 0) {
                      const msgObj = getAssistantComment('random', 0, day);
                      setMsg(msgObj.text, msgObj.speaker);
                  }
              }
              
              if (mode === 'CURSE_BACK') {
                  setCurseBackTimer(t => {
                      if (t <= 1) { endCurseBack(); return 0; }
                      return t - 1;
                  });
                  if (time % (day >= 6 ? 2 : 3) === 0) infectGrid();
                  if (Math.random() < 0.15) executeEnemyAttack('IN_CURSE_BACK');
                  // 呪い返し中の基本ダメージは少しだけ緩和（お邪魔ピースによるダメージがあるため）
                  setSpirit(s => Math.max(0, s - 0.2));
              }

              setRottenTimer(t => {
                  if (t >= rottenSpreadInterval) {
                      spreadRotten();
                      return 0;
                  }
                  return t + 1;
              });

          }, [time]); // Runs every second when time changes

          useEffect(() => {
              if (curseGauge >= 100 && !showClearEffect) finishGame(true);
          }, [curseGauge, showClearEffect]);

          return (
            <div className={`h-full flex flex-col ${mode === 'CURSE_BACK' ? 'bg-slate-900 glitch-wrapper' : 'bg-slate-900'} relative overflow-hidden pt-12 pb-8`}>
              {/* 背景アセットの適用 */}
              <AssetImage assetKey="PUZZLE_BG" className="absolute inset-0 z-0 pointer-events-none opacity-20" fallback={null} />

              {mode === 'CURSE_BACK' && <div className="absolute inset-0 z-0 pointer-events-none opacity-40 bg-red-600 animate-pulse mix-blend-multiply"></div>}
              {(mode === 'CURSE_BACK' || day === 7) && <div className="absolute inset-0 z-0 pointer-events-none opacity-30 bg-[url('https://www.transparenttextures.com/patterns/noise-lines.png')] animate-glitch-bg"></div>}
              {day === 7 && <div className="absolute inset-0 z-[60] pointer-events-none bg-red-500/10 mix-blend-overlay animate-pulse"></div>}

              {showClearEffect && (
                  <div className="absolute inset-0 z-[100] flex items-center justify-center bg-black/80 pointer-events-none">
                      <div className="relative animate-stamp-in">
                          <div className="absolute inset-0 bg-white rounded-full opacity-50 animate-shockwave scale-150"></div>
                          <div className="text-8xl font-black text-yellow-400 font-serif drop-shadow-[0_0_20px_rgba(255,0,0,0.8)] border-4 border-white px-8 py-4 rounded bg-red-600 transform -rotate-6 whitespace-nowrap">
                              業務完了
                          </div>
                      </div>
                  </div>
              )}

              {/* --- UI Area --- */}
              <div className="h-[30%] p-2 flex text-white relative z-10 border-b-4 border-double border-purple-500 bg-black/30 overflow-hidden shadow-lg backdrop-blur-sm">
                <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/seigaiha.png')]"></div>
                {/* Chihiro Icon */}
                <div className="w-[30%] flex flex-col items-center justify-center border-r-2 border-dashed border-purple-700 pr-1 relative z-20">
                     <div className={`w-24 h-24 bg-pink-100 rounded-full mb-1 border-4 border-purple-400 overflow-hidden relative shadow-[0_0_10px_rgba(236,72,153,0.5)] ${day === 7 ? 'animate-glitch-text' : ''}`}>
                         <AssetImage assetKey={getChihiroIconKey()} className="w-full h-full" bgPos="center bottom" fallback={
                             <div className="absolute top-4 left-3 text-xl">
                                 {assistantMsg.speaker === 'boss' ? '👹' : assistantMsg.speaker === 'enemy' ? '👁️‍🗨️' : (day >= 7 ? '💀' : (mode === 'CURSE_BACK' ? '😭' : curseGauge > 80 ? '🤩' : '😊'))}
                             </div>
                         }/>
                     </div>
                     <div className="text-xs text-center font-bold font-serif bg-purple-900 px-2 rounded-full border border-purple-400">{getSpeakerName()}</div>
                </div>
                
                <div className="flex-1 flex flex-col pl-2 relative z-20 justify-between py-1">
                    <div className="flex justify-between items-start gap-2 w-full">
                        <div className="flex-1 flex flex-col gap-1 w-full">
                            {/* Gauge */}
                            <div className="flex justify-between items-end px-1 leading-none">
                                <span className="text-sm font-bold text-purple-200 font-serif tracking-widest drop-shadow-md">怨念</span>
                                <span className="text-2xl font-bold text-red-500 font-serif drop-shadow-md leading-none">{Math.floor(curseGauge)}<span className="text-sm text-gray-400 ml-0.5">%</span></span>
                            </div>
                            <div className="h-4 bg-gray-900/80 rounded border border-purple-800 relative overflow-hidden w-full">
                                <div className="h-full bg-gradient-to-r from-purple-900 via-purple-600 to-red-600 transition-all duration-300 relative" style={{ width: `${curseGauge}%` }}></div>
                            </div>
                            
                            {/* Spirit */}
                            <div className="flex justify-between items-end px-1 leading-none">
                                <span className="text-sm font-bold text-cyan-200 font-serif tracking-widest drop-shadow-md">精神</span>
                                <span className="text-2xl font-bold text-cyan-400 font-serif drop-shadow-md">{Math.floor(spirit)}</span>
                            </div>
                            <div className="h-4 bg-gray-900/80 rounded border border-cyan-800 relative overflow-hidden w-full">
                                <div className="h-full bg-gradient-to-r from-blue-900 via-cyan-600 to-teal-400 transition-all duration-300 relative" style={{ width: `${spirit}%` }}></div>
                            </div>
                        </div>

                        {/* Timer */}
                        <div className={`flex flex-col items-center justify-center w-16 h-14 bg-black/50 border-2 ${time < 30 ? 'border-red-600 shadow-[0_0_15px_red]' : 'border-purple-500 shadow-[0_0_10px_purple]'} rounded-lg relative overflow-hidden transition-all duration-300 shrink-0`}>
                            <div className="text-[10px] text-gray-400 font-serif z-10">刻限</div>
                            <div className={`text-2xl font-serif font-bold z-10 ${time < 30 ? 'text-red-500 animate-pulse' : 'text-white'}`}>{time}</div>
                        </div>
                    </div>
                    
                    <div className={`flex-1 min-h-[40px] bg-black/60 border border-purple-500/50 rounded-lg p-2 text-sm flex items-center relative overflow-hidden transition-all duration-200 mt-1 ${mode === 'CURSE_BACK' ? 'border-red-500 shadow-[0_0_10px_red]' : ''}`}>
                         <span className={`relative z-10 font-serif leading-tight whitespace-pre-wrap text-gray-100 ${mode === 'CURSE_BACK' || day === 7 ? 'animate-glitch-text' : ''}`}>{assistantMsg.text}</span>
                    </div>
                </div>
              </div>

              {mode === 'CURSE_BACK' && <div className="absolute top-[30%] w-full bg-red-600/90 text-white text-center py-2 z-20 font-bold animate-pulse font-serif tracking-widest shadow-lg border-y-2 border-yellow-400 text-sm sm:text-base px-2">
                  <div className="flex items-center justify-center gap-1 sm:gap-2">
                      <span className="whitespace-nowrap">⚠️ 呪い返し発生中！ 残り {curseBackTimer}秒 ⚠️</span>
                  </div>
              </div>}

              {/* --- Play Area --- */}
              <div className="h-[70%] relative flex flex-col touch-none select-none">
                  <div className={`flex-1 p-2 flex items-center justify-center ${shake ? 'animate-shake' : ''}`}>
                     <div ref={gridContainerRef} className={`relative grid grid-cols-7 gap-1 bg-slate-900/90 border-[6px] border-double border-indigo-900 p-1 rounded-xl shadow-2xl aspect-square w-full max-w-md touch-none`} style={{ touchAction: 'none' }} onTouchMove={handlePointerMove} onMouseMove={handlePointerMove} onTouchEnd={handlePointerUp} onMouseUp={handlePointerUp} onMouseLeave={handlePointerUp}>
                        <div className="absolute inset-0 bg-indigo-950 opacity-50 rounded-lg pointer-events-none"></div>
                        <EffectLayer effects={particles} />
                        <ComboOverlay comboData={comboOverlay} />
                        {grid.map((row, y) => (
                            row.map((cell, x) => (
                                <div key={`${y}-${x}-${cell?.id}`} data-x={x} data-y={y} onMouseDown={(e) => handlePointerDown(e, x, y)} onTouchStart={(e) => handlePointerDown(e, x, y)} className={`relative rounded cursor-pointer flex items-center justify-center transition-all duration-200 ${selected?.x === x && selected?.y === y ? 'bg-white ring-2 ring-yellow-400 scale-105 z-10 shadow-lg' : 'bg-slate-800/80'} ${mode === 'CURSE_BACK' && !cell?.isObstacle ? 'animate-pulse' : ''} ${cell?.isFalling ? 'animate-bounce-drop' : ''}`}>
                                    {cell && (
                                        <div className="w-[85%] h-[85%] relative flex items-center justify-center">
                                            <AssetImage assetKey={TYPES[cell.type].asset} className="flex items-center justify-center w-full h-full" fallback={
                                                <>
                                                    <span className={`text-2xl ${cell.isObstacle ? (cell.type === 'CURSE_KANJI' || cell.type === 'ROTTEN' ? 'text-3xl' : 'text-red-500') : ''} drop-shadow-md select-none pointer-events-none ${cell.type === 'CURSE_KANJI' ? 'text-red-600 font-serif font-bold' : ''}`}>
                                                        {cell.type === 'CURSE_KANJI' ? cell.label : (cell.type === 'ROTTEN' ? TYPES.ROTTEN.icon : (cell.isObstacle ? TYPES.OBSTACLE.icon : TYPES[cell.type].icon))}
                                                    </span>
                                                    {fx?.type === 'column' && fx.x === x && <div className="absolute inset-0 bg-yellow-200 opacity-50 animate-ping"></div>}
                                                </>
                                            } />
                                        </div>
                                    )}
                                </div>
                            ))
                        ))}
                     </div>
                  </div>

                  {/* Item Buttons */}
                  <div className="h-16 bg-slate-900 flex justify-around items-center px-4 border-t-2 border-purple-900 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.5)] relative z-20">
                      {Object.keys(ITEMS).map(key => {
                          const itemConfig = ITEMS[key];
                          const itemId = itemConfig.id;
                          if (itemConfig.hidden && initialInventory[itemId] <= 0) return null;
                          return (
                            <button key={key} onClick={() => useItem(itemId)} disabled={initialInventory[itemId] <= 0} className={`flex flex-row items-center justify-center gap-1 w-20 h-12 rounded-lg border-2 ${initialInventory[itemId] > 0 ? 'bg-purple-900 border-purple-500 hover:bg-purple-800 text-white shadow-[0_0_10px_rgba(168,85,247,0.4)]' : 'bg-gray-800 border-gray-600 text-gray-500'} transition-all active:scale-95`}>
                                <span className="text-xl pointer-events-none">{itemConfig.icon}</span>
                                <span className="text-sm font-bold font-mono pointer-events-none">x{initialInventory[itemId]}</span>
                            </button>
                          );
                      })}
                  </div>
              </div>
            </div>
          );
        };

        // --- Result, Review & Shop ---
        const ResultAndShop = ({ resultData, onNext, currentMoney, onAddMoney, inventory, onBuyItem, isInfinite }) => {
            const [step, setStep] = useState('RESULT');
            const [salary, setSalary] = useState(currentMoney); 
            const [coinEffects, setCoinEffects] = useState([]); 
            const containerRef = useRef(null); 

            const earnings = resultData.score + (resultData.time * 100) + (resultData.spirit * 50);
            const currentRank = SORCERER_RANKS.find(r => earnings >= r.min) || SORCERER_RANKS[SORCERER_RANKS.length - 1];
            
            if (!isInfinite && resultData.day === 8 && step === 'RESULT') {
                return (
                    <div className="h-full flex flex-col items-center justify-center bg-black text-white p-6 relative">
                        <div className="text-4xl font-serif text-red-600 animate-pulse mb-8">決着</div>
                        <button onClick={onNext} className="px-8 py-3 bg-red-800 rounded-lg text-xl border-2 border-red-500">……その後</button>
                    </div>
                );
            }

            const story = STORY_DATA[resultData.day] || STORY_DATA[30];
            const priceRate = story.priceRate || 1.0;

            const handleReceiveSalary = () => {
                onAddMoney(earnings); setSalary(currentMoney + earnings); 
                if (isInfinite) setStep('SHOP'); else setStep('REVIEW');
                const newEffects = []; for (let i = 0; i < 15; i++) newEffects.push({ id: Date.now() + i, x: window.innerWidth/2, y: window.innerHeight/2, angle: Math.random() * 360, velocity: Math.random() * 200 + 100 });
                setCoinEffects(prev => [...prev, ...newEffects]); setTimeout(() => setCoinEffects(prev => prev.filter(ef => !newEffects.includes(ef))), 1000);
            };

            const handleBuy = (itemKey, e) => {
                const item = ITEMS[itemKey.toUpperCase()];
                const price = Math.floor(item.price * priceRate);
                if (salary >= price) {
                    onAddMoney(-price); setSalary(s => s - price); onBuyItem(itemKey, 1);
                    const rect = e.currentTarget.getBoundingClientRect();
                    const newEffects = []; for (let i = 0; i < 8; i++) newEffects.push({ id: Date.now() + i, x: rect.left+rect.width/2, y: rect.top+rect.height/2, angle: Math.random() * 360, velocity: Math.random() * 100 + 50 });
                    setCoinEffects(prev => [...prev, ...newEffects]); setTimeout(() => setCoinEffects(prev => prev.filter(ef => !newEffects.includes(ef))), 1000);
                }
            };

            // 無限モード用のマミのセリフをランダムに決定
            const mamiInfiniteQuote = useMemo(() => {
                if (!isInfinite) return null;
                const quotes = [
                    "「終わらない呪い……素敵じゃない？\nさあ、次のお仕事も頑張ってね♡」",
                    "「あら、また来てくれたのね。\nふふ……あなたのその疲れた顔、とてもそそるわ。\n……少し休んでいく？」",
                    "「終わりのない螺旋……\nどこまで深く堕ちていくのかしらね。\n私がずっと、見届けてあげる。」",
                    "「外は相変わらず地獄みたい。\nでも、ここなら安全よ。\n……一生、ここに居てもいいのよ？」",
                    "「あらあら、随分と稼いできたわね。\n地獄の沙汰も金次第。\nさあ、もっと私に貢いでちょうだい♡」"
                ];
                return quotes[Math.floor(Math.random() * quotes.length)];
            }, [isInfinite]);

            if (step === 'RESULT') {
                return (
                    <div ref={containerRef} className="h-full flex flex-col items-center justify-center bg-slate-900 text-white p-6 pt-12 pb-8 relative overflow-hidden">
                        <AssetImage assetKey="BG_RESULT" className="absolute inset-0 z-0 opacity-50" fallback={null} />
                        <div className="absolute inset-0 pointer-events-none z-[100] overflow-hidden">{coinEffects.map(e => <div key={e.id} className="absolute text-yellow-400 animate-fly-coin" style={{left:e.x,top:e.y,'--angle':`${e.angle}deg`,'--velocity':`${e.velocity}px`}}><YenCoinIcon size={24}/></div>)}</div>
                        <h2 className="text-3xl font-serif text-purple-400 mb-4 border-b-2 border-purple-600 pb-2 z-10">給与明細</h2>
                        <div className={`w-full max-w-xs mb-6 p-4 rounded-lg border-4 ${currentRank.border} ${currentRank.bg} ${currentRank.shadow} shadow-lg relative overflow-hidden z-10`}>
                              <div className="text-center"><div className="text-xs text-gray-300 font-serif mb-1">今回の評価</div><div className={`text-4xl font-bold font-serif ${currentRank.color} tracking-widest drop-shadow-md`}>{currentRank.name}</div></div>
                        </div>
                        <div className="w-full max-w-xs bg-white text-black p-6 rounded shadow-lg font-mono mb-8 rotate-1 border-4 border-double border-gray-300 z-10">
                            <div className="border-b border-black mb-4 pb-2 text-center font-bold text-xl font-serif">日本呪術代行会社 タタリン</div>
                            <div className="flex justify-between mb-2"><span>基本給</span> <span>¥{resultData.score}</span></div>
                            <div className="flex justify-between mb-2"><span>残業代</span> <span>¥{resultData.time * 100}</span></div>
                            <div className="flex justify-between text-xl font-bold mt-2 text-red-600 border-t-2 border-black pt-1"><span>支給額</span> <span>¥{earnings.toLocaleString()}</span></div>
                        </div>
                        <button onClick={handleReceiveSalary} className="px-8 py-3 bg-red-600 rounded-lg text-lg font-bold hover:bg-red-500 animate-pulse font-serif border-2 border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.6)] text-white w-full max-w-xs z-10">給与を受領</button>
                    </div>
                );
            }

            const isYataDown = resultData.day >= 7 && !isInfinite;
            const yataAssetKey = (!isInfinite && resultData.day >= 4 && resultData.day < 7) ? "STANDEE_YATA_SICK" : "STANDEE_YATA";
            const isMamiDown = resultData.day >= 7 && !isInfinite;
            const mamiAssetKey = (!isInfinite && resultData.day >= 4 && resultData.day < 7) ? "STANDEE_MAMI_SICK" : "STANDEE_MAMI";

            if (step === 'REVIEW') {
                const reviews = story.reviews || [];
                const comment = story.yataComment;
                return (
                    <div className="h-full bg-slate-800 text-white flex flex-col pt-4 relative overflow-hidden">
                        <AssetImage assetKey="BG_REVIEW" className="absolute inset-0 z-0 opacity-50" fallback={null} />
                        <div className="px-4 pb-1 bg-slate-900 shadow-md z-10 border-b border-purple-900 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold text-orange-400 font-serif tracking-widest">お客様の声</h2>
                            <div className="text-xs text-gray-400">広報部提供</div>
                        </div>
                        
                        {resultData.day === 7 ? (
                            <div className="p-8 text-center text-gray-400 font-serif flex-1 flex items-center justify-center z-10">システムエラー：レビューデータを取得できません<br/>広報担当者不在</div>
                        ) : (
                            <div className="p-2 space-y-2 border-b border-slate-600 bg-slate-800/80 z-10">
                                {reviews.map((rev, idx) => (
                                    <div key={idx} className={`text-black p-2 rounded shadow-lg relative border-l-4 ${rev.type === 'ominous' ? 'bg-gray-200 border-red-900' : 'bg-white border-blue-500'}`}>
                                        <div className="flex items-center justify-between mb-0.5">
                                            <div className="flex items-center">{[...Array(5)].map((_, i) => (<Star key={i} size={14} className={i < rev.stars ? "text-yellow-400 fill-yellow-400" : "text-gray-300"} />))}</div>
                                            <span className="text-xs font-bold text-gray-500">{rev.reviewer}</span>
                                        </div>
                                        <h3 className={`font-bold text-sm mb-0.5 ${rev.type === 'ominous' ? 'text-red-900' : 'text-gray-800'}`}>{rev.title}</h3>
                                        <p className={`text-xs leading-tight ${rev.type === 'ominous' ? 'font-serif text-gray-900' : 'text-gray-600'}`}>{rev.body}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="flex-1 bg-transparent border-t-4 border-orange-600 relative z-10 min-h-0 flex flex-col justify-end">
                            <div className="absolute inset-0 pointer-events-none z-0">
                                {isYataDown ? (<div className="absolute bottom-4 right-4 bg-slate-800 border-2 border-gray-600 p-2 rounded text-gray-400 font-serif text-xs max-w-[200px]">※ チヒロ代行中</div>) : (
                                    <div className="absolute bottom-0 right-0 w-[75%] aspect-[3/4] pointer-events-none z-0">
                                        <AssetImage assetKey={yataAssetKey} className="w-full h-full" bgPos="right bottom" fallback={<div className="w-full h-full bg-orange-200 rounded-t-full border-4 border-orange-500"></div>}/>
                                    </div>
                                )}
                            </div>
                            <div className="relative z-20 p-2 w-full">
                                <div className="mb-2 bg-black/90 border-2 border-white/50 rounded-lg p-2 text-white font-serif shadow-lg">
                                    <div className="text-sm leading-relaxed whitespace-pre-wrap">{comment}</div>
                                </div>
                                <button onClick={() => setStep('SHOP')} className="w-full py-2 bg-orange-600 rounded-lg text-lg font-bold hover:bg-orange-500 shadow-[0_3px_0_rgb(154,52,18)] text-white tracking-widest font-serif shrink-0">購買部へ進む</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // SHOP STEP
            return (
                <div ref={containerRef} className="h-full bg-slate-800 text-white flex flex-col pt-4 relative overflow-hidden">
                    <AssetImage assetKey="BG_SHOP" className="absolute inset-0 z-0 opacity-50" fallback={null} />
                    <div className="absolute inset-0 pointer-events-none z-[100] overflow-hidden">{coinEffects.map(e => <div key={e.id} className="absolute text-yellow-400 animate-fly-coin" style={{left:e.x,top:e.y,'--angle':`${e.angle}deg`,'--velocity':`${e.velocity}px`}}><YenCoinIcon size={24}/></div>)}</div>
                    <div className="px-4 pb-1 bg-slate-900 shadow-md z-10 border-b border-purple-900">
                        <h2 className="text-xl text-center font-bold text-yellow-400 font-serif tracking-widest">社内購買部 {priceRate > 1 ? <span className="text-red-500 text-xs">（物価高騰中 x{priceRate}）</span> : ''}</h2>
                        <div className="text-right font-mono text-lg text-green-400">所持金: ¥{salary.toLocaleString()}</div>
                    </div>
                    <div className="p-2 space-y-2 bg-slate-800/80 border-b border-slate-600 z-10">
                        {Object.keys(ITEMS).map(key => { 
                            const item = ITEMS[key];
                            const itemId = item.id;
                            if (item.hidden && inventory[itemId] <= 0) return null; // 秘巻は持ってなければ表示しない、無限モードでは買えない
                            const price = Math.floor(item.price * priceRate);
                            return (
                                <div key={key} className="bg-slate-700/80 p-2 rounded flex items-center justify-between border border-slate-600 shadow-sm">
                                    <div className="flex items-center gap-2"><div className="bg-slate-900 p-1 rounded text-2xl w-10 h-10 flex items-center justify-center border border-slate-500">{item.icon}</div><div><div className="font-bold text-base text-purple-200">{item.name} <span className="text-xs text-yellow-300">所持:{inventory[item.id] || 0}</span></div><div className="text-[10px] text-gray-400">{item.desc}</div></div></div>
                                    <button onClick={(e) => handleBuy(item.id, e)} disabled={salary < price || (item.hidden && true)} className={`px-3 py-1 rounded font-bold text-xs min-w-[70px] transition-all ${salary < price ? 'bg-gray-600 text-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500 text-white shadow-[0_3px_0_rgb(21,128,61)] active:shadow-none active:translate-y-1'}`}>¥{price.toLocaleString()}</button>
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex-1 bg-transparent border-t-4 border-pink-600 relative z-10 flex flex-col justify-end">
                        <div className="absolute inset-0 pointer-events-none z-0">
                             {isMamiDown ? (<div className="absolute bottom-4 right-4 bg-slate-800 border-2 border-gray-600 p-2 rounded text-gray-400 font-serif text-xs max-w-[200px]">※ チヒロ代行中</div>) : (
                                <div className="absolute bottom-0 right-0 w-[75%] aspect-[3/4] pointer-events-none z-0">
                                    <AssetImage assetKey={mamiAssetKey} className="w-full h-full" bgPos="right bottom" fallback={<div className="w-full h-full bg-pink-200 rounded-t-full border-4 border-pink-500"></div>}/>
                                </div>
                            )}
                        </div>
                        <div className="relative z-20 p-2 w-full">
                            <div className="mb-2 bg-black/90 border-2 border-white/50 rounded-lg p-2 text-white font-serif shadow-lg">
                                <div className="text-sm leading-relaxed whitespace-pre-wrap">{isInfinite ? mamiInfiniteQuote : story.mamiComment}</div>
                            </div>
                            <button onClick={onNext} className="w-full py-2 bg-red-600 rounded-lg text-lg font-bold hover:bg-red-500 shadow-[0_3px_0_rgb(153,27,27)] text-white tracking-widest font-serif shrink-0">次の業務（{toKanji(resultData.day + 1)}日目）へ</button>
                        </div>
                    </div>
                </div>
            );
        };

        const LoadingScreen = ({ progress, isLoaded, onTapStart }) => {
            return (
                <div 
                    className={`absolute inset-0 z-[10000] bg-zinc-950 flex flex-col items-center justify-center overflow-hidden transition-opacity duration-500 ${isLoaded ? 'cursor-pointer' : ''}`}
                    onClick={isLoaded ? onTapStart : undefined}
                    onTouchStart={isLoaded ? onTapStart : undefined}
                >
                    <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/black-scales.png')] pointer-events-none"></div>
                    <div className="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/noise-lines.png')] animate-glitch-bg pointer-events-none"></div>
                    
                    <div className="relative z-10 flex flex-col items-center">
                        <div className="text-xs tracking-[0.5em] text-red-800 font-bold mb-2 uppercase drop-shadow-[0_0_5px_rgba(220,38,38,0.8)] animate-pulse">A Game by</div>
                        <h1 className="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-600 via-purple-600 to-red-600 mb-12 font-serif tracking-tighter drop-shadow-[0_0_15px_rgba(255,0,0,0.5)]" style={{ WebkitTextStroke: '1px rgba(255,255,255,0.2)' }}>
                            Bocchi-Bochi-Games
                        </h1>
                        
                        <div className="h-16 flex flex-col items-center justify-center w-full transition-all duration-300">
                            {!isLoaded ? (
                                <div className="flex flex-col items-center w-48 animate-fade-in">
                                    <div className="w-full h-1 bg-gray-900 rounded-full overflow-hidden relative">
                                        <div className="h-full bg-gradient-to-r from-red-800 to-red-500 shadow-[0_0_10px_red] transition-all duration-200 ease-out" style={{ width: `${progress}%` }}></div>
                                    </div>
                                    <div className="mt-3 text-[10px] font-mono text-gray-500 tracking-widest animate-pulse">
                                        ASSETS LOADING... {Math.floor(progress)}%
                                    </div>
                                </div>
                            ) : (
                                <div className="text-xl font-serif font-bold text-red-500 tracking-widest animate-pulse drop-shadow-[0_0_8px_rgba(220,38,38,0.8)] cursor-pointer">
                                    - Tap to Start -
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const GameContent = () => {
          const { playBGM, stopBGM } = useContext(AssetContext);
          const [gameState, setGameState] = useState('LOADING'); // 初期状態をLOADINGに変更
          const [puzzleResult, setPuzzleResult] = useState(null);
          const [money, setMoney] = useState(0); 
          const [day, setDay] = useState(0); 
          const [inventory, setInventory] = useState({ ofuda: 1, juzu: 1, crystal: 1, scroll: 0 });
          const [isTransitionActive, setIsTransitionActive] = useState(false); 
          const [isInfiniteMode, setIsInfiniteMode] = useState(false);
          const [showDebug, setShowDebug] = useState(false);
          const [isDebugModeEnabled, setIsDebugModeEnabled] = useState(false); 
          const [isAssetsLoaded, setIsAssetsLoaded] = useState(false);
          const [loadProgress, setLoadProgress] = useState(0);
          const secretClickCount = useRef(0);

          useEffect(() => {
              // HTMLプレローダーを消す
              const initialLoader = document.getElementById('initial-loader');
              if (initialLoader) {
                  initialLoader.style.opacity = '0';
                  setTimeout(() => {
                      if (initialLoader.parentNode) {
                          initialLoader.parentNode.removeChild(initialLoader);
                      }
                  }, 500);
              }
              
              if (['TITLE'].includes(gameState)) {
                  playBGM('BGM_TITLE');
              } else if (['ADV_INTRO', 'ADV_OUTRO', 'NEWS', 'RESULT', 'REVIEW', 'SHOP'].includes(gameState)) {
                  playBGM('BGM_ADV');
              } else if (['PUZZLE'].includes(gameState)) {
                  playBGM('BGM_PUZZLE');
              } else if (['GAMEOVER', 'LOADING'].includes(gameState)) {
                  stopBGM(); // ゲームオーバー、または初期ロード中は停止
              }
          }, [gameState, playBGM, stopBGM]);

          useEffect(() => {
              const urlsToLoad = [];
              const allAssets = { ...DEFAULT_ASSET_CONFIG, ...(typeof EMBEDDED_ASSETS !== 'undefined' ? EMBEDDED_ASSETS : {}) };
              for (const key in allAssets) {
                  if (allAssets[key].url && allAssets[key].type !== 'audio') { // 画像のみプリロード
                      urlsToLoad.push(allAssets[key].url);
                  }
              }

              if (urlsToLoad.length === 0) {
                  // アセットが未設定の場合のダミーローディング
                  let p = 0;
                  const intv = setInterval(() => {
                      p += 5;
                      setLoadProgress(p);
                      if (p >= 100) {
                          clearInterval(intv);
                          setTimeout(() => setIsAssetsLoaded(true), 500);
                      }
                  }, 40);
                  return;
              }

              let loadedCount = 0;
              let hasFinished = false;

              const checkDone = () => {
                  if (hasFinished) return;
                  if (loadedCount >= urlsToLoad.length) {
                      hasFinished = true;
                      setLoadProgress(100);
                      setTimeout(() => setIsAssetsLoaded(true), 800);
                  }
              };

              urlsToLoad.forEach(url => {
                  const img = new Image();
                  img.onload = () => { loadedCount++; setLoadProgress((loadedCount / urlsToLoad.length) * 100); checkDone(); };
                  img.onerror = () => { loadedCount++; setLoadProgress((loadedCount / urlsToLoad.length) * 100); checkDone(); };
                  img.src = url;
              });
              
              // フォールバック（ネットワーク遅延対策で最大8秒で強制待機終了）
              setTimeout(() => {
                  if (!hasFinished) {
                      hasFinished = true;
                      setLoadProgress(100);
                      setTimeout(() => setIsAssetsLoaded(true), 500);
                  }
              }, 8000);
          }, []);

          const handleTapToStart = useCallback((e) => {
              if (e) {
                  e.preventDefault();
                  e.stopPropagation();
              }
              
              // フルスクリーン化のリクエスト (ブラウザによる違いを吸収)
              const docElm = document.documentElement;
              if (docElm.requestFullscreen) {
                  docElm.requestFullscreen().catch(err => console.log("Fullscreen API failed:", err));
              } else if (docElm.webkitRequestFullscreen) {
                  docElm.webkitRequestFullscreen().catch(err => console.log("Fullscreen API failed:", err));
              }

              // ここでAudioContextを明示的に再開・再生することで自動再生ブロックを回避
              AudioSystem.resumeContext();
              playBGM('BGM_TITLE'); 
              setGameState('TITLE');
          }, [playBGM]);

          const handleUpdateInventory = (itemKey, amount) => {
              setInventory(prev => ({ ...prev, [itemKey]: Math.max(0, (prev[itemKey] || 0) + amount) }));
          };

          const changeState = useCallback((newState, callback) => {
              setIsTransitionActive(true);
              setTimeout(() => { 
                  setGameState(newState); 
                  if (callback) callback();
                  setTimeout(() => { setIsTransitionActive(false); }, 800); 
              }, 700);
          }, []);

          const startGame = (infinite = false) => {
              setDay(1);
              setMoney(0);
              setInventory({ ofuda: 1, juzu: 1, crystal: 1, scroll: 0 });
              setIsInfiniteMode(infinite);
              changeState(infinite ? 'PUZZLE' : 'ADV_INTRO');
          };

          const handleSecretClick = () => {
              secretClickCount.current += 1;
              if (secretClickCount.current >= 5) {
                  setShowDebug(true);
                  secretClickCount.current = 0;
              }
          };

          const handleDebugUnlock = () => {
              setIsDebugModeEnabled(true);
          };

          const handleForceClear = () => {
              setMoney(m => m + 20000);
              setPuzzleResult({
                  score: 9999,
                  time: 60,
                  spirit: 100,
                  cleared: true,
                  day: day
              });
              changeState('RESULT');
          };

          const story = useMemo(() => STORY_DATA[day] || STORY_DATA[30], [day]);

          useEffect(() => {
              if (day === 8 && !isInfiniteMode) {
                  handleUpdateInventory('scroll', 2);
              }
          }, [day, isInfiniteMode]);

          const outroScript = useMemo(() => {
              const rawText = story.chihiroAdv;
              if (!rawText) return [{speaker:'assistant', speakerName:'チヒロ', text:'...'}];
              
              if (Array.isArray(rawText)) {
                  return rawText.map(t => ({ speaker:'assistant', speakerName:'チヒロ', text: t }));
              }
              return [{ speaker:'assistant', speakerName:'チヒロ', text: rawText }];
          }, [story]);
            
          const newsScript = useMemo(() => {
            return story.news || [];
          }, [story]);

          return (
            <div className="w-full h-[100dvh] flex items-center justify-center bg-zinc-950 overflow-hidden" onClick={AudioSystem.resumeContext} onTouchStart={AudioSystem.resumeContext}>
                <div className="w-full h-full sm:h-[844px] sm:w-[390px] sm:rounded-2xl sm:border border-gray-800 bg-black text-slate-200 font-sans overflow-hidden shadow-2xl relative flex flex-col">
                        {gameState === 'LOADING' && <LoadingScreen progress={loadProgress} isLoaded={isAssetsLoaded} onTapStart={handleTapToStart} />}
                        <SceneTransition isActive={isTransitionActive} />
                        
                        {showDebug && <DebugPanel onClose={() => setShowDebug(false)} />}

                        {/* Debug Button */}
                        {isDebugModeEnabled && (
                            <div className="absolute top-2 left-2 z-[9999] flex flex-col gap-2">
                                {gameState === 'PUZZLE' && (
                                    <button 
                                        onClick={handleForceClear} 
                                        className="bg-red-600 text-white p-2 text-xs font-bold border-2 border-white rounded shadow-lg animate-pulse"
                                    >
                                        DEBUG: CLEAR (+2万)
                                    </button>
                                )}
                                <button 
                                    onClick={() => setShowDebug(!showDebug)} 
                                    className="bg-blue-600 text-white p-2 text-xs font-bold border-2 border-white rounded shadow-lg hover:bg-blue-500"
                                >
                                    🔧 アセット設定
                                </button>
                            </div>
                        )}

                        {gameState === 'TITLE' && <TitleScreen onStart={() => startGame(false)} onInfinite={() => startGame(true)} onSecret={handleSecretClick} onDebugUnlock={handleDebugUnlock} />}
                        {gameState === 'ADV_INTRO' && <AdvPart key="intro" script={INTRO_SCRIPT} onComplete={() => changeState('PUZZLE')} day={0} initialDelay={800} />}
                        {gameState === 'PUZZLE' && (<PuzzlePart key={`puzzle-${day}`} day={day} initialInventory={inventory} updateInventory={handleUpdateInventory} isInfinite={isInfiniteMode} onFinish={(result) => { 
                            setPuzzleResult(result); 
                            if (result.cleared) {
                                changeState('RESULT'); 
                            } else {
                                changeState('GAMEOVER');
                            }
                        }} />)}
                        {gameState === 'GAMEOVER' && puzzleResult && (
                            <GameOverScreen 
                                reason={puzzleResult.time <= 0 ? 'TIME_UP' : 'SPIRIT_ZERO'} 
                                onRetry={() => changeState('PUZZLE')} 
                                onTitle={() => changeState('TITLE')} 
                            />
                        )}
                        {gameState === 'RESULT' && puzzleResult && (<ResultAndShop key={`result-${day}`} resultData={puzzleResult} 
                                onNext={() => {
                                    if (!isInfiniteMode && day === 8) { changeState('ADV_OUTRO'); return; }
                                    
                                    if (isInfiniteMode) {
                                        if (day >= 30) { alert("究極の呪術師！ おめでとう！"); changeState('TITLE'); }
                                        else { 
                                            changeState('PUZZLE', () => setDay(d => d + 1)); 
                                        }
                                        return;
                                    }
                                    changeState('ADV_OUTRO');
                                }} 
                                currentMoney={money} onAddMoney={(amount) => setMoney(m => m + amount)} inventory={inventory} onBuyItem={handleUpdateInventory} isInfinite={isInfiniteMode} />)}
                        {gameState === 'ADV_OUTRO' && (<AdvPart key={`outro-${day}`} script={outroScript} 
                                onComplete={() => { 
                                    if (day === 8) changeState('TITLE'); 
                                    else changeState('NEWS'); 
                                }} 
                                day={day} initialDelay={800} />)}
                        {gameState === 'NEWS' && (<AdvPart key={`news-${day}`} script={newsScript} bgType="news" 
                            onComplete={() => {
                                changeState('PUZZLE', () => setDay(d => d + 1));
                            }} 
                            day={day} initialDelay={800} />)}
                </div>
            </div>
          );
        };

        const App = () => {
            return (
                <AssetProvider>
                    <GameContent />
                </AssetProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
